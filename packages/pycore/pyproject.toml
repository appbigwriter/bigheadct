[project]
name = "bigheadct-pycore"
version = "0.1.0"
description = "Modelos compartilhados entre API e worker"
requires-python = "==3.14.*"
dependencies = ["pydantic>=2.11.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bighead_pycore"]
