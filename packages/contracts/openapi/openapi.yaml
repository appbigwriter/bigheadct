components:
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
  responses:
    Problem:
      description: Erro no formato RFC 9457
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    AgentCreateRequest:
      properties:
        name:
          type: string
          maxLength: 160
          minLength: 2
          title: Name
        slug:
          type: string
          maxLength: 160
          minLength: 2
          title: Slug
        description:
          anyOf:
          - type: string
            maxLength: 2000
          - type: 'null'
          title: Description
        riskLevel:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          title: Risklevel
          default: medium
        prompt:
          type: string
          maxLength: 100000
          minLength: 1
          title: Prompt
        modelId:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Modelid
        limits:
          additionalProperties: true
          type: object
          title: Limits
        skillIds:
          items:
            type: string
            format: uuid
          type: array
          title: Skillids
      type: object
      required:
      - name
      - slug
      - prompt
      title: AgentCreateRequest
    AgentDetailResponse:
      properties:
        agent:
          additionalProperties: true
          type: object
          title: Agent
        versions:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Versions
        consumers:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Consumers
        confidence:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Confidence
      type: object
      required:
      - agent
      - confidence
      title: AgentDetailResponse
    AgentPatchRequest:
      properties:
        name:
          anyOf:
          - type: string
            maxLength: 160
            minLength: 2
          - type: 'null'
          title: Name
        description:
          anyOf:
          - type: string
            maxLength: 2000
          - type: 'null'
          title: Description
        riskLevel:
          anyOf:
          - type: string
            enum:
            - low
            - medium
            - high
            - critical
          - type: 'null'
          title: Risklevel
        isEnabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Isenabled
        prompt:
          anyOf:
          - type: string
            maxLength: 100000
            minLength: 1
          - type: 'null'
          title: Prompt
        modelId:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Modelid
        limits:
          additionalProperties: true
          type: object
          title: Limits
        skillIds:
          anyOf:
          - items:
              type: string
              format: uuid
            type: array
          - type: 'null'
          title: Skillids
        expectedVersion:
          type: integer
          minimum: 0.0
          title: Expectedversion
      type: object
      required:
      - expectedVersion
      title: AgentPatchRequest
    AnalyticsPeriod:
      properties:
        from:
          type: string
          format: date-time
          title: From
        to:
          type: string
          format: date-time
          title: To
        boundary:
          type: string
          const: '[from,to)'
          title: Boundary
      type: object
      required:
      - from
      - to
      - boundary
      title: AnalyticsPeriod
    AnalyticsSummaryCard:
      properties:
        key:
          type: string
          title: Key
        value:
          type: integer
          title: Value
        source:
          type: string
          const: tasks.created_at
          title: Source
        period:
          $ref: '#/components/schemas/AnalyticsPeriod'
        timezone:
          type: string
          title: Timezone
        freshness:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Freshness
      type: object
      required:
      - key
      - value
      - source
      - period
      - timezone
      title: AnalyticsSummaryCard
    AnalyticsSummaryDrilldown:
      properties:
        card:
          type: string
          const: total
          title: Card
        dimension:
          type: string
          title: Dimension
        value:
          type: integer
          title: Value
        recordIds:
          items:
            type: string
            format: uuid
          type: array
          title: Recordids
        recordCount:
          type: integer
          title: Recordcount
        recordsTruncated:
          type: boolean
          title: Recordstruncated
        recordsEndpoint:
          type: string
          const: /v1/analytics/summary/records
          title: Recordsendpoint
      type: object
      required:
      - card
      - dimension
      - value
      - recordIds
      - recordCount
      - recordsTruncated
      - recordsEndpoint
      title: AnalyticsSummaryDrilldown
    AnalyticsSummaryFilters:
      properties:
        cards:
          items:
            type: string
          type: array
          title: Cards
      type: object
      title: AnalyticsSummaryFilters
    AnalyticsSummaryReconciliation:
      properties:
        card:
          type: string
          const: total
          title: Card
        cardValue:
          type: integer
          title: Cardvalue
        drilldownValue:
          type: integer
          title: Drilldownvalue
        reconciled:
          type: boolean
          title: Reconciled
      type: object
      required:
      - card
      - cardValue
      - drilldownValue
      - reconciled
      title: AnalyticsSummaryReconciliation
    AnalyticsSummaryRecord:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        status:
          type: string
          title: Status
        createdAt:
          type: string
          format: date-time
          title: Createdat
      type: object
      required:
      - id
      - status
      - createdAt
      title: AnalyticsSummaryRecord
    AnalyticsSummaryRecordPage:
      properties:
        items:
