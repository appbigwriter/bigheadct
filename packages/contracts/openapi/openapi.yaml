openapi: 3.1.0
info:
  title: BigHead API
  version: 0.3.0
  description: 'Contrato canônico Sprint 3: matriz T01-T56 e implementação FastAPI.'
servers:
- url: http://localhost:8000
  description: Local
paths:
  /v1/auth/login:
    post:
      tags:
      - access
      summary: Login
      operationId: login_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          $ref: '#/components/responses/Problem'
        '429':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T01
      x-bighead-role: publico
      x-bighead-cache-event: '`no-store`; incrementa rate-limit'
      x-bighead-critical-error: credenciais invalidas sem enumerar email
  /v1/auth/recovery:
    post:
      tags:
      - access
      summary: Recovery
      operationId: recovery_v1_auth_recovery_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryRequestedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '400':
          $ref: '#/components/responses/Problem'
        '410':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T02
      x-bighead-role: publico
      x-bighead-cache-event: sem cache; emite `auth.recovery.requested`
      x-bighead-critical-error: token expirado ou usado
  /v1/invitations/{token}/accept:
    post:
      tags:
      - access
      summary: Accept Invitation
      operationId: accept_invitation_v1_invitations__token__accept_post
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          title: Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationAcceptResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '410':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T03
      x-bighead-role: publico
      x-bighead-cache-event: token unico; invalida convites
      x-bighead-critical-error: convite revogado ou email divergente
  /v1/onboarding:
    post:
      tags:
      - access
      summary: Onboarding
      operationId: onboarding_v1_onboarding_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingSubmitRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingSubmitResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          $ref: '#/components/responses/Problem'
      security:
      - HTTPBearer: []
      x-bighead-screen: T04
      x-bighead-role: autenticado sem membership
      x-bighead-cache-event: salva progresso local; `onboarding.completed`
      x-bighead-critical-error: sessao expirada no wizard
  /v1/organizations:
    get:
      tags:
      - access
      summary: Organizations
      operationId: organizations_v1_organizations_get
      security:
      - HTTPBearer: []
      parameters:
      - name: includeSuspended
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Includesuspended
      - name: currentOrganizationId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Currentorganizationid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T05
      x-bighead-role: member
      x-bighead-cache-event: invalida cache do tenant ao trocar
      x-bighead-critical-error: tenant removido durante selecao
  /v1/analytics/summary:
    get:
      tags:
      - analytics
      summary: Summary
      operationId: summary_v1_analytics_summary_get
      security:
      - HTTPBearer: []
      parameters:
      - name: from
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: From
      - name: to
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: To
      - name: timezone
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            minLength: 1
            maxLength: 64
          - type: 'null'
          title: Timezone
      - name: cards
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: Cards
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummaryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '206':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T06
      x-bighead-role: owner/analyst
      x-bighead-cache-event: freshness por card; `analytics.summary.updated`
      x-bighead-critical-error: KPI parcial
      x-bighead-screens:
      - T06
      - T48
  /v1/search/global:
    post:
      tags:
      - search
      summary: Global Search
      operationId: global_search_v1_search_global_post
      security:
      - HTTPBearer: []
      parameters:
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalSearchRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalSearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T07
      x-bighead-role: member
      x-bighead-cache-event: '`no-store`; analytics de busca'
      x-bighead-critical-error: recurso removido ou sem acesso
  /v1/notifications:
    get:
      tags:
      - notifications
      summary: Notifications
      operationId: notifications_v1_notifications_get
      security:
      - HTTPBearer: []
      parameters:
      - name: filter
        in: query
        required: false
        schema:
          enum:
          - all
          - unread
          type: string
          default: all
          title: Filter
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T08
      x-bighead-role: member
      x-bighead-cache-event: polling/realtime; `notifications.updated`
      x-bighead-critical-error: alvo sem acesso ao abrir
  /v1/preferences:
    get:
      tags:
      - access
      summary: Get Preferences
      operationId: get_preferences_v1_preferences_get
      security:
      - HTTPBearer: []
      parameters:
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '409':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T09
      x-bighead-role: member
      x-bighead-cache-event: persistencia local + invalida perfil
      x-bighead-critical-error: conflito de preferencia
    patch:
      tags:
      - access
      summary: Patch Preferences
      operationId: patch_preferences_v1_preferences_patch
      security:
      - HTTPBearer: []
      parameters:
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferencesPatchRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '409':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T09
      x-bighead-role: member
      x-bighead-cache-event: persistencia local + invalida perfil
      x-bighead-critical-error: conflito de preferencia
  /v1/rooms:
    get:
      tags:
      - collaboration
      summary: Rooms
      operationId: rooms_v1_rooms_get
      security:
      - HTTPBearer: []
      parameters:
      - name: visibility
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Visibility
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '201':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T10
      x-bighead-role: member
      x-bighead-cache-event: cursor + counters; `rooms.updated`
      x-bighead-critical-error: sala privada filtrada incorretamente
    post:
      tags:
      - collaboration
      summary: Create Room
      operationId: create_room_v1_rooms_post
      security:
      - HTTPBearer: []
      parameters:
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '200':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T10
      x-bighead-role: member
      x-bighead-cache-event: cursor + counters; `rooms.updated`
      x-bighead-critical-error: sala privada filtrada incorretamente
  /v1/rooms/{roomId}/messages:
    get:
      tags:
      - collaboration
      summary: Messages
      operationId: messages_v1_rooms__roomId__messages_get
      security:
      - HTTPBearer: []
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Roomid
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T11
      x-bighead-role: member
      x-bighead-cache-event: realtime + dedupe; `messages.created`
      x-bighead-critical-error: upload/reconnect falho com duplicidade
    post:
      tags:
      - collaboration
      summary: Create Message
      operationId: create_message_v1_rooms__roomId__messages_post
      security:
      - HTTPBearer: []
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Roomid
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: Room access denied
        '409':
          description: Idempotency conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/rooms/{roomId}/members:
    get:
      tags:
      - collaboration
      summary: Room Members
      operationId: room_members_v1_rooms__roomId__members_get
      security:
      - HTTPBearer: []
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Roomid
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomMemberListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T12
      x-bighead-role: member
      x-bighead-cache-event: leitura sem cache; privacidade da sala por RLS
      x-bighead-critical-error: sala privada invisivel
  /v1/rooms/{roomId}/files:
    get:
      tags:
      - collaboration
      summary: Room Files
      operationId: room_files_v1_rooms__roomId__files_get
      security:
      - HTTPBearer: []
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Roomid
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomFileListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
        '410':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T13
      x-bighead-role: member
      x-bighead-cache-event: signed URL curta; `files.quarantine.updated`
      x-bighead-critical-error: arquivo em quarantine
  /v1/tasks:
    get:
      tags:
      - collaboration
      - tasks
      summary: Tasks
      operationId: tasks_v1_tasks_get
      security:
      - HTTPBearer: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TaskStatus'
          - type: 'null'
          title: Status
      - name: ownerId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Ownerid
      - name: assigneeId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Assigneeid
      - name: risk
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TaskRiskLevel'
          - type: 'null'
          title: Risk
      - name: slaStatus
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TaskSlaStatus'
          - type: 'null'
          title: Slastatus
      - name: roomId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Roomid
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T14
      x-bighead-role: member
      x-bighead-cache-event: cursor; `tasks.updated`; tarefa herda visibilidade da sala
      x-bighead-critical-error: lista vazia sem CTA
    post:
      tags:
      - collaboration
      - tasks
      summary: Create Task
      operationId: create_task_v1_tasks_post
      security:
      - HTTPBearer: []
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 200
          pattern: .*\S.*
          title: Idempotency-Key
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '409':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T15
      x-bighead-role: member
      x-bighead-cache-event: '`Idempotency-Key`; `tasks.created`'
      x-bighead-critical-error: dependencia circular
  /v1/tasks/{taskId}:
    get:
      tags:
      - collaboration
      - tasks
      summary: Task Detail
      operationId: task_detail_v1_tasks__taskId__get
      security:
      - HTTPBearer: []
      parameters:
      - name: taskId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Taskid
      - name: x-organization-id
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T16
      x-bighead-role: member/reviewer
      x-bighead-cache-event: invalida detalhe; `tasks.transitioned`
      x-bighead-critical-error: conflito `409` preservando comentario
  /v1/runs:
    get:
      tags:
      - collaboration
      - runs
      summary: Runs
      operationId: runs_v1_runs_get
      security:
      - HTTPBearer: []
      parameters:
      - name: taskId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Taskid
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
